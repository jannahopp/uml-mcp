name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/requirements*.txt

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/requirements*.txt

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: |
          uv run pytest --cov=mcp_core --cov=kroki --cov-report=term --cov-report=html

      - name: Integration tests (MCP Client)
        run: USE_REAL_FASTMCP=1 uv run pytest tests/integration -v --no-cov
        continue-on-error: true

      - name: Health check (FastAPI UML API)
        run: |
          uv run python -c "
          import subprocess, time
          import httpx
          p = subprocess.Popen(['uv', 'run', 'uvicorn', 'app:app', '--host', '127.0.0.1', '--port', '8765'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          try:
            time.sleep(3)
            r = httpx.get('http://127.0.0.1:8765/health', timeout=5)
            assert r.status_code == 200, r.status_code
            print('Health check OK')
          finally:
            p.terminate()
            p.wait(timeout=5)
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14
