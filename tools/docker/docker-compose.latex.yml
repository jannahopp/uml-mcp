# Optional Docker Compose for local LaTeX/TikZ compilation.
# Use with: docker compose -f tools/docker/docker-compose.latex.yml up -d
# Then run xelatex/pdflatex inside the container or from host against mounted volume.
# Diagram output is written to ../../output (project output dir).

services:
  latex-compiler:
    build:
      context: .
      dockerfile: Dockerfile.latex
    image: uml-mcp-latex:local
    container_name: uml-mcp-latex
    environment:
      - LATEX_ENGINE=${LATEX_ENGINE:-xelatex}
    volumes:
      - ../../output:/output
      - ../../examples:/workspace/examples:ro
    working_dir: /workspace
    # Keep running so you can: docker exec -it uml-mcp-latex bash
    command: ["sleep", "infinity"]
