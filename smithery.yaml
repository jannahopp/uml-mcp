# Smithery.ai configuration
name: uml-mcp
version: "1.2.0"
description: "UML diagram generation server with MCP interface supporting PlantUML, Mermaid, Kroki, and D2"

startCommand:
  type: stdio
  # Session Configuration: flat schema only (string/number/boolean), max 20 fields, 1KB
  # x-from: where Smithery reads config (header/query for HTTP; CLI args for stdio)
  configSchema:
    type: "object"
    properties:
      debug:
        type: "boolean"
        title: "Debug mode"
        description: "Enable debug mode for verbose logging"
        default: false
        x-from: { query: "debug" }
      output_dir:
        type: "string"
        title: "Output directory"
        description: "Directory to store generated diagram files"
        default: "/app/output"
        x-from: { query: "output_dir" }
      transport:
        type: "string"
        title: "Transport"
        description: "Transport protocol to use (stdio or http)"
        enum: ["stdio", "http"]
        default: "stdio"
        x-from: { query: "transport" }
      host:
        type: "string"
        title: "Host"
        description: "Host to bind to when using HTTP transport"
        default: "127.0.0.1"
        x-from: { query: "host" }
      port:
        type: "integer"
        title: "Port"
        description: "Port to bind to when using HTTP transport"
        default: 8000
        minimum: 1024
        maximum: 65535
        x-from: { query: "port" }
      log_level:
        type: "string"
        title: "Log level"
        description: "Logging level"
        enum: ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
        default: "INFO"
        x-from: { query: "log_level" }
      kroki_server:
        type: "string"
        title: "Kroki server URL"
        description: "Kroki server URL for diagram rendering"
        default: "https://kroki.io"
        x-from: { query: "kroki_server" }
      plantuml_server:
        type: "string"
        title: "PlantUML server URL"
        description: "PlantUML server URL (leave empty to use Kroki)"
        default: ""
        x-from: { query: "plantuml_server" }
      enabled_formats:
        type: "string"
        title: "Enabled formats"
        description: "Comma-separated diagram formats (plantuml,mermaid,d2,graphviz,erd). Empty for all."
        default: ""
        x-from: { query: "enabled_formats" }
    additionalProperties: false
    description: "Configuration for UML diagram generation server"
  commandFunction: |-
    (config) => {
      // Build command arguments
      const args = ["server.py"];

      // Add transport option
      if (config.transport) {
        args.push("--transport", config.transport);
      }

      // Add debug flag if enabled
      if (config.debug) {
        args.push("--debug");
      }

      // Add host and port if using http transport
      if (config.transport === "http") {
        if (config.host) {
          args.push("--host", config.host);
        }
        if (config.port) {
          args.push("--port", config.port.toString());
        }
      }

      // Build environment variables
      const env = {
        "PYTHONUNBUFFERED": "1"  // Ensure unbuffered Python output
      };

      // Add output directory
      if (config.output_dir) {
        env.UML_MCP_OUTPUT_DIR = config.output_dir;
      }

      // Add log level
      if (config.log_level) {
        env.LOG_LEVEL = config.log_level;
      }

      // Add Kroki server
      if (config.kroki_server) {
        env.KROKI_SERVER = config.kroki_server;
      }

      // Add PlantUML server
      if (config.plantuml_server) {
        env.PLANTUML_SERVER = config.plantuml_server;
      }

      // Add enabled formats (string: comma-separated per Session Config)
      const formats = config.enabled_formats;
      if (formats && (typeof formats === "string" ? formats.trim() : formats.length > 0)) {
        env.ENABLED_FORMATS = Array.isArray(formats) ? formats.join(",") : formats.trim();
      }

      // Return command configuration
      return {
        command: "python",
        args: args,
        env: env
      };
    }
  exampleConfig: {
    "debug": false,
    "output_dir": "/app/output",
    "transport": "stdio",
    "log_level": "INFO"
  }
  healthCheck:
    interval: "30s"
    timeout: "5s"
    retries: 3
    startPeriod: "10s"

# Build configuration
build:
  dockerBuildPath: "."
  dockerfile: "./Dockerfile"

# Server capabilities based on actual console output
capabilities:
  # Server information
  serverName: "UML Diagram Generator"

  # Tools from console output (single diagram tool)
  tools:
    - name: "generate_uml"
      description: "Generate any UML or diagram by type (class, sequence, mermaid, d2, etc.)"
      parameters:
        - name: "diagram_type"
          type: "string"
          description: "Type of diagram (e.g. class, sequence, activity, mermaid, d2)"
          required: true
        - name: "code"
          type: "string"
          description: "Diagram code in the format for the chosen type"
          required: true
        - name: "output_dir"
          type: "string"
          description: "Directory where to save the generated image"
        - name: "output_format"
          type: "string"
          description: "Output format: svg, png, or pdf"
        - name: "theme"
          type: "string"
          description: "PlantUML theme (only for PlantUML diagram types)"

  # Prompts from console output
  prompts:
    - name: "class_diagram"
      description: "Create a UML class diagram showing classes, attributes, methods, and relationships"

    - name: "sequence_diagram"
      description: "Create a UML sequence diagram showing interactions between objects over time"

    - name: "activity_diagram"
      description: "Create a UML activity diagram showing workflows and business processes"

  # Resources from console output
  resources:
    - name: "uml://types"
      description: "List of available UML diagram types"

    - name: "uml://templates"
      description: "Templates for creating UML diagrams"

    - name: "uml://examples"
      description: "Example UML diagrams for reference"

    - name: "uml://formats"
      description: "Supported output formats for diagrams"

    - name: "uml://server-info"
      description: "Information about the UML-MCP server"
